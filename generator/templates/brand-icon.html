<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FrameCoach — Brand Icon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: {{WIDTH}}px;
    height: {{HEIGHT}}px;
    overflow: hidden;
    background: #141414;
  }

  .slide {
    width: {{WIDTH}}px;
    height: {{HEIGHT}}px;
    background: #141414;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: {{PAD}}px;
  }

  /* Subtle grain texture overlay */
  .slide::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
    opacity: 0.35;
    z-index: 1;
  }

  /* Corner accent lines */
  .corner {
    position: absolute;
    width: {{CORNER_SIZE}}px;
    height: {{CORNER_SIZE}}px;
    z-index: 2;
  }
  .corner--tl { top: {{CORNER_OFFSET}}px; left: {{CORNER_OFFSET}}px; }
  .corner--tr { top: {{CORNER_OFFSET}}px; right: {{CORNER_OFFSET}}px; transform: scaleX(-1); }
  .corner--bl { bottom: {{CORNER_OFFSET}}px; left: {{CORNER_OFFSET}}px; transform: scaleY(-1); }
  .corner--br { bottom: {{CORNER_OFFSET}}px; right: {{CORNER_OFFSET}}px; transform: scale(-1); }

  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: {{GAP}}px;
    z-index: 3;
    text-align: center;
    width: 100%;
  }

  .fc-icon {
    width: {{ICON_SIZE}}px;
    height: {{ICON_SIZE}}px;
    flex-shrink: 0;
  }

  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: {{HEADLINE_SIZE}}px;
    font-weight: 400;
    color: #f7f7f7;
    letter-spacing: 0.02em;
    line-height: 1.0;
    text-align: center;
    text-transform: uppercase;
    white-space: pre-line;
  }

  .body {
    font-family: 'Poppins', sans-serif;
    font-size: {{BODY_SIZE}}px;
    font-weight: 300;
    color: #ACACAB;
    line-height: 1.55;
    text-align: center;
    font-style: italic;
    max-width: {{BODY_MAX_WIDTH}}px;
    letter-spacing: 0.01em;
  }

  .wordmark {
    position: absolute;
    bottom: {{WORDMARK_BOTTOM}}px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: {{WORDMARK_GAP}}px;
    z-index: 3;
  }

  .wordmark-text {
    font-family: 'Poppins', sans-serif;
    font-size: {{WORDMARK_SIZE}}px;
    font-weight: 600;
    color: #8E8E8E;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .wordmark-dot {
    width: {{DOT_SIZE}}px;
    height: {{DOT_SIZE}}px;
    background: #E32326;
    border-radius: 50%;
  }
</style>
</head>
<body>
<div class="slide">
  <!-- Corner brackets -->
  <svg class="corner corner--tl" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 30 L2 2 L30 2" stroke="#E32326" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>
  <svg class="corner corner--tr" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 30 L2 2 L30 2" stroke="#E32326" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>
  <svg class="corner corner--bl" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 30 L2 2 L30 2" stroke="#E32326" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>
  <svg class="corner corner--br" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 30 L2 2 L30 2" stroke="#E32326" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>

  <div class="content">
    <!-- FC Viewfinder Icon -->
    <svg class="fc-icon" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Viewfinder corner brackets -->
      <!-- Top-left -->
      <path d="M20 65 L20 20 L65 20" stroke="#E32326" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <!-- Top-right -->
      <path d="M180 65 L180 20 L135 20" stroke="#E32326" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <!-- Bottom-left -->
      <path d="M20 135 L20 180 L65 180" stroke="#E32326" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <!-- Bottom-right -->
      <path d="M180 135 L180 180 L135 180" stroke="#E32326" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <!-- FC Lettermark -->
      <text x="100" y="118" font-family="'Bebas Neue', sans-serif" font-size="72" font-weight="400" fill="#f7f7f7" text-anchor="middle" letter-spacing="2">FC</text>
    </svg>

    <h1 class="headline">{{HEADLINE}}</h1>
    <p class="body">{{BODY}}</p>
  </div>

  <!-- Bottom wordmark -->
  <div class="wordmark">
    <span class="wordmark-text">FrameCoach</span>
    <div class="wordmark-dot"></div>
    <span class="wordmark-text">framecoach.io</span>
  </div>
</div>
</body>
</html>
