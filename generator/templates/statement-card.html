<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FrameCoach — Statement Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: {{WIDTH}}px;
    height: {{HEIGHT}}px;
    overflow: hidden;
    background: #141414;
  }

  .slide {
    width: {{WIDTH}}px;
    height: {{HEIGHT}}px;
    background: #141414;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: {{OUTER_PAD}}px;
  }

  /* Subtle vignette */
  .slide::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
    z-index: 1;
  }

  .card {
    width: 100%;
    height: 100%;
    border: {{BORDER_WIDTH}}px solid #E32326;
    border-radius: {{CARD_RADIUS}}px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: {{CARD_PAD}}px;
    position: relative;
    z-index: 2;
    gap: {{GAP}}px;
  }

  /* Inner glow on border */
  .card::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: {{CARD_RADIUS}}px;
    box-shadow: inset 0 0 {{GLOW_SIZE}}px rgba(227,35,38,0.12), 0 0 {{GLOW_SIZE}}px rgba(227,35,38,0.06);
    pointer-events: none;
  }

  .viewfinder {
    width: {{VF_SIZE}}px;
    height: {{VF_SIZE}}px;
    flex-shrink: 0;
  }

  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: {{HEADLINE_SIZE}}px;
    font-weight: 400;
    color: #f7f7f7;
    letter-spacing: 0.02em;
    line-height: 0.96;
    text-align: center;
    text-transform: uppercase;
    white-space: pre-line;
  }

  .rule {
    width: {{RULE_WIDTH}}px;
    height: 2px;
    background: linear-gradient(to right, transparent, #E32326, transparent);
    flex-shrink: 0;
  }

  .body {
    font-family: 'Poppins', sans-serif;
    font-size: {{BODY_SIZE}}px;
    font-weight: 300;
    color: #ACACAB;
    line-height: 1.6;
    text-align: center;
    font-style: italic;
    max-width: {{BODY_MAX_WIDTH}}px;
    letter-spacing: 0.01em;
  }

  .wordmark {
    position: absolute;
    bottom: {{WM_BOTTOM}}px;
    right: {{WM_RIGHT}}px;
    font-family: 'Poppins', sans-serif;
    font-size: {{WM_SIZE}}px;
    font-weight: 600;
    color: rgba(247,247,247,0.35);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    z-index: 3;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="card">
    <!-- Viewfinder icon at top of card -->
    <svg class="viewfinder" viewBox="0 0 120 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Left bracket -->
      <path d="M12 12 L12 48 M12 12 L36 12" stroke="#E32326" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <!-- Right bracket -->
      <path d="M108 12 L108 48 M108 12 L84 12" stroke="#E32326" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>

    <h1 class="headline">{{HEADLINE}}</h1>
    <div class="rule"></div>
    <p class="body">{{BODY}}</p>
  </div>

  <span class="wordmark">FrameCoach</span>
</div>
</body>
</html>
